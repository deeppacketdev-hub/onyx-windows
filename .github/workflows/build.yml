name: Build and Publish Onyx Launcher

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup .NET 8.0 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install MSBuild Tools
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet Packages
      run: dotnet restore OnyxWindows/OnyxWindows.csproj

    - name: Compile and Publish WinUI 3 App
      shell: pwsh
      run: |
        $logFile = "build.log"
        dotnet publish OnyxWindows/OnyxWindows.csproj `
          -c Release `
          -r win-x64 `
          -p:Platform=x64 `
          --self-contained true `
          -o ./publish > $logFile 2>&1
        $exitCode = $LASTEXITCODE
        if ($exitCode -ne 0) {
            Get-Content $logFile | ForEach-Object {
                Write-Host $_
                if ($_ -match '^([^(]+)\((\d+),(\d+)\):\s*error\s+([^:]+):\s*(.*)$') {
                    $filePath = $Matches[1].Trim()
                    $line = $Matches[2]
                    $col = $Matches[3]
                    $code = $Matches[4].Trim()
                    $msg = $Matches[5].Trim()
                    if ($filePath.StartsWith($env:GITHUB_WORKSPACE)) {
                        $filePath = $filePath.Substring($env:GITHUB_WORKSPACE.Length).TrimStart("\/")
                    }
                    $filePath = $filePath.Replace("\", "/")
                    Write-Host "::error file=$filePath,line=$line,col=$col::$code: $msg"
                }
            }
            exit $exitCode
        }

    - name: Upload Downloadable executable (.exe)
      uses: actions/upload-artifact@v4
      with:
        name: OnyxLauncher-Windows-x64
        path: ./publish/
