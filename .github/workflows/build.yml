name: Build and Publish Onyx Launcher

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup .NET 8.0 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install MSBuild Tools
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet Packages
      run: dotnet restore OnyxWindows/OnyxWindows.csproj

    - name: Compile and Publish WinUI 3 App
      run: |
        dotnet publish OnyxWindows/OnyxWindows.csproj `
          -c Release `
          -r win-x64 `
          -p:Platform=x64 `
          --self-contained true `
          -o ./publish

    - name: Upload Downloadable executable (.exe)
      uses: actions/upload-artifact@v4
      with:
        name: OnyxLauncher-Windows-x64
        path: ./publish/
